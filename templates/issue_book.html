<!DOCTYPE html>
<html>
<head>

<title>Issue Book</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

<h2>Issue Book</h2>

<form method="post">

<div class="mb-3">

<label class="form-label">Select Book</label>

<select name="book_code" class="form-control">

{% for b in books %}

<option value="{{ b[1] }}">
{{ b[1] }} ({{ b[0] }})
</option>

{% end %}

</select>

</div>

<button class="btn btn-success">Issue Book</button>

<a href="/student" class="btn btn-secondary">Back</a>

</form>

</div>

</body>
</html>
