<!DOCTYPE html>
<html>
<head>

</head>

<body class="bg-light">

<div class="container mt-4">

<h2>Return Book</h2>

<table class="table table-bordered">

<tr>
<th>Book Code</th>
<th>Return</th>
</tr>

{% for b in books %}

<tr>

<td>{{ b[0] }}</td>

<td>

<button class="btn btn-danger">Return</button>

</form>

</td>

</tr>

{% end %}

</table>

<a href="/student" class="btn btn-secondary">Back</a>

</div>

</body>
</html>
