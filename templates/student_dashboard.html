
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Student Dashboard</title>

</head>

<body class="bg-light">

<div class="container mt-4">

<h2 class="mb-4">Student Dashboard</h2>

<div class="row g-3">

<div class="col-lg-3 col-md-6 col-12">
<a href="/student" class="btn btn-primary w-100">View Books</a>
</div>

<div class="col-lg-3 col-md-6 col-12">
<a href="/issue" class="btn btn-success w-100">Issue Book</a>
</div>

<div class="col-lg-3 col-md-6 col-12">
<a href="/return" class="btn btn-warning w-100">Return Book</a>
</div>

<div class="col-lg-3 col-md-6 col-12">
<a href="/logout" class="btn btn-danger w-100">Logout</a>
</div>

</div>

<hr class="my-4">

<h4>Available Books</h4>

<table class="table table-bordered table-striped">

<thead>
<tr>
<th>Book Code</th>
<th>Book Name</th>
<th>Author</th>
<th>Quantity</th>
</tr>
</thead>

<tbody>

{% for b in books %}

<tr>

<td>{{ b[1] }}</td>   <!-- book_code -->
<td>{{ b[2] }}</td>   <!-- book_name -->
<td>{{ b[3] }}</td>   <!-- author -->
<td>{{ b[4] }}</td>   <!-- quantity -->

</tr>

{% end %}

</tbody>

</table>

</div>

</body>
</html>
